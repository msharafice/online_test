{% extends "base.html" %}
{% block title %}Add Question{% endblock %}

{% block extra_css %}
<style>
  /* چون base.html داخل body یک .container دارد، باید همون رو وسط‌چین کنیم */
  .container {
    max-width: 520px;
    padding: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
  }

  .card {
    background: white;
    width: 520px;
    max-width: 95%;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    margin: 0 auto;
  }

  h2 {
    text-align: center;
    margin-bottom: 10px;
  }

  .back {
    display: block;
    text-align: center;
    margin-bottom: 20px;
    font-weight: 700;
  }

  form p { margin-bottom: 12px; }

  textarea {
    resize: vertical;
    min-height: 90px;
  }

  button {
    width: 100%;
    margin-top: 10px;
  }
</style>
{% endblock %}

{% block content %}
  <div class="card">
    <h2>Add Question</h2>

    <a class="back" href="{% url 'questions:exam_questions' exam.id %}">← Back to Exam</a>

    {% if form.errors %}
      <div class="errors">{{ form.errors }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Next</button>
    </form>
  </div>
{% endblock %}
