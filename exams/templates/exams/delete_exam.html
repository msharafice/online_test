{% extends "base.html" %}
{% block title %}Delete Exam{% endblock %}

{% block extra_css %}
<style>
    .delete-card {
        max-width: 520px;
        margin: 60px auto;
        background: white;
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
        text-align: center;
    }

    h2 {
        margin-bottom: 15px;
        color: #111827;
    }

    .warning {
        color: #dc2626;
        font-weight: 600;
        margin-bottom: 25px;
    }

    .btn-group {
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    .btn {
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        border: none;
    }

    .confirm {
        background: #ef4444;
        color: white;
    }

    .confirm:hover {
        background: #dc2626;
    }

    .cancel {
        background: #e5e7eb;
        color: #111827;
    }

    .cancel:hover {
        background: #d1d5db;
    }
</style>
{% endblock %}

{% block content %}
<div class="delete-card">
    <h2>Delete Exam</h2>

    <p>Are you sure you want to delete:</p>
    <p class="warning">"{{ exam.title }}"</p>

    <form method="post">
        {% csrf_token %}
        <div class="btn-group">
            <button type="submit" class="btn confirm">Yes, Delete</button>
            <a href="{% url 'questions:dashboard' %}" class="btn cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
