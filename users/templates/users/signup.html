{% extends "base.html" %}
{% block title %}Signup{% endblock %}

{% block extra_css %}
<style>
  .signup-card {
    background: white;
    padding: 40px;
    width: 380px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    margin: 0 auto;
  }

  h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #1f2937;
  }

  form p {
    margin-bottom: 15px;
  }

  button {
    width: 100%;
    margin-top: 10px;
  }

  .login-link {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
  }

  .login-link a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 700;
  }

  .login-link a:hover {
    text-decoration: underline;
  }

  .error-text {
    margin-top: 10px;
    color: red;
    text-align: center;
    font-weight: 700;
  }
</style>
{% endblock %}

{% block content %}
  <div class="signup-card">
    <h2>Signup</h2>

    {% if not show_code_form %}
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
      </form>
    {% else %}
      <form method="post">
        {% csrf_token %}
        <input type="text" name="code" placeholder="Enter email code" required>
        <button type="submit">Verify</button>

        {% if error %}
          <div class="error-text">{{ error }}</div>
        {% endif %}
      </form>
    {% endif %}

    <div class="login-link">
      <a href="{% url 'users:login' %}">Login</a>
    </div>
  </div>
{% endblock %}
