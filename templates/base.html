<!doctype html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <title>{% block title %}Online Test{% endblock %}</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a8a, #2563eb); /* آبی قبلی */
      padding: 40px 20px;
    }

    /* ---------- Navbar ---------- */
    .navbar {
      max-width: 1100px;
      margin: 0 auto 25px auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 14px;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .navbar .logo {
      font-size: 20px;
      font-weight: 700;
      color: #1e3a8a;
    }

    .navbar .menu a {
      margin-left: 18px;
      color: #1f2937;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
    }

    .navbar .menu a:hover {
      color: #2563eb;
    }

    /* ---------- Main container ---------- */
    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.3);
    }

    h2, h3 {
      color: #1f2937;
      margin-bottom: 12px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      padding: 10px 18px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #1d4ed8;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .errors {
      background: #fee2e2;
      color: #991b1b;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #fecaca;
      margin-bottom: 15px;
      font-size: 14px;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">Online Test System</div>

    <div class="menu">
      {% if user.is_authenticated %}
        {% if user.is_teacher %}
          <a href="{% url 'questions:dashboard' %}">Dashboard</a>
        {% else %}
          <a href="{% url 'exams:student_dashboard' %}">Exams</a>
        {% endif %}
        <a href="{% url 'users:logout' %}">Logout</a>
      {% else %}
        <a href="{% url 'users:login' %}">Login</a>
        <a href="{% url 'users:signup' %}">Signup</a>
      {% endif %}
    </div>
  </div>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  {% block extra_js %}{% endblock %}
</body>
</html>
